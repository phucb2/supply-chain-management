services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,HOST://0.0.0.0:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_OFFSETS_TOPIC_NUM_PARTITIONS: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_NUM_PARTITIONS: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "q1Sh-9_ISia_zwGINzRvyQ"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 10s
      timeout: 15s
      retries: 10
      start_period: 90s

  # rabbitmq:
  #   image: rabbitmq:3-management
  #   container_name: rabbitmq
  #   ports:
  #     - "5672:5672"
  #     - "15672:15672"
  #   environment:
  #     RABBITMQ_DEFAULT_USER: guest
  #     RABBITMQ_DEFAULT_PASS: guest
  #   healthcheck:
  #     test: rabbitmq-diagnostics -q ping
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10

  # mqtt:
  #   image: emqx/emqx:5.8.3
  #   container_name: mqtt
  #   ports:
  #     - "1883:1883"
  #     - "18083:18083"
  #   healthcheck:
  #     test: emqx ctl status
  #     interval: 10s
  #     timeout: 5s
  #     retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/tmp/create-topics.sh"]
    volumes:
      - ./scripts/create-topics.sh:/tmp/create-topics.sh

  ksqldb-server:
    image: confluentinc/cp-ksqldb-server:7.7.1
    hostname: ksqldb-server
    container_name: ksqldb-server
    ports:
      - "8088:8088"
    environment:
      KSQL_BOOTSTRAP_SERVERS: kafka:29092
      KSQL_LISTENERS: http://0.0.0.0:8088
      KSQL_KSQL_SERVICE_ID: supplychain-ksqldb
      KSQL_KSQL_LOGGING_PROCESSING_STREAM_AUTO_CREATE: "true"
      KSQL_KSQL_LOGGING_PROCESSING_TOPIC_AUTO_CREATE: "true"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: curl -sf http://localhost:8088/info || exit 1
      interval: 10s
      timeout: 15s
      retries: 20
      start_period: 120s

  ksqldb-cli:
    image: confluentinc/cp-ksqldb-cli:7.7.1
    container_name: ksqldb-cli
    entrypoint: /bin/sh
    tty: true
    depends_on:
      ksqldb-server:
        condition: service_healthy

  ksqldb-init:
    image: confluentinc/cp-ksqldb-cli:7.7.1
    container_name: ksqldb-init
    depends_on:
      ksqldb-server:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    entrypoint: ["/bin/bash", "/tmp/init-ksqldb.sh"]
    volumes:
      - ./infra/ksqldb/init.sql:/tmp/init.sql
      - ./scripts/init-ksqldb.sh:/tmp/init-ksqldb.sh

  # # Debezium Kafka Connect + Postgres CDC (topics: supplychain.cdc.<schema>.<table>)
  # debezium-connect:
  #   image: quay.io/debezium/connect:3.0.4.Final
  #   container_name: debezium-connect
  #   ports:
  #     - "8083:8083"
  #   environment:
  #     BOOTSTRAP_SERVERS: kafka:29092
  #     GROUP_ID: 1
  #     CONFIG_STORAGE_TOPIC: debezium_connect_configs
  #     OFFSET_STORAGE_TOPIC: debezium_connect_offsets
  #     STATUS_STORAGE_TOPIC: debezium_connect_statuses
  #     CONFIG_STORAGE_REPLICATION_FACTOR: 1
  #     OFFSET_STORAGE_REPLICATION_FACTOR: 1
  #     STATUS_STORAGE_REPLICATION_FACTOR: 1
  #     OFFSET_STORAGE_PARTITIONS: 1
  #     STATUS_STORAGE_PARTITIONS: 1
  #     KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
  #     VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
  #     KEY_CONVERTER_SCHEMAS_ENABLE: "false"
  #     VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
  #   depends_on:
  #     kafka:
  #       condition: service_healthy
  #     postgresql:
  #       condition: service_healthy

  # debezium-init:
  #   image: curlimages/curl:8.11.1
  #   container_name: debezium-init
  #   depends_on:
  #     debezium-connect:
  #       condition: service_started
  #     kafka-init:
  #       condition: service_completed_successfully
  #   environment:
  #     KAFKA_CONNECT_URL: http://debezium-connect:8083
  #     POSTGRES_DB: ${POSTGRES_DB:-supplychain}
  #     DEBEZIUM_DB_PASSWORD: ${DEBEZIUM_DB_PASSWORD:-debezium_secret}
  #   entrypoint: ["/bin/sh", "/scripts/register-debezium-connector.sh"]
  #   volumes:
  #     - ./scripts/register-debezium-connector.sh:/scripts/register-debezium-connector.sh:ro

  postgresql:
    image: postgres:16
    container_name: postgresql
    # Logical decoding for Debezium (requires new data dir or manual wal_level + restart).
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=4
      - -c
      - max_replication_slots=4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-supplychain}
      POSTGRES_USER: ${POSTGRES_USER:-supplychain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supplychain_secret}
      DEBEZIUM_DB_PASSWORD: ${DEBEZIUM_DB_PASSWORD:-debezium_secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./infra/postgres/init-debezium-user.sh:/docker-entrypoint-initdb.d/02-debezium-user.sh
      - ./infra/postgres/03-debezium-publication.sql:/docker-entrypoint-initdb.d/03-debezium-publication.sql
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER:-supplychain}
      interval: 10s
      timeout: 60s
      retries: 10
      start_period: 60s

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin_secret}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: mc ready local
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/tmp/init-buckets.sh"]
    volumes:
      - ./scripts/init-buckets.sh:/tmp/init-buckets.sh

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.18.0
    container_name: mlflow
    ports:
      - "5001:5001"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-minioadmin_secret}
    command: ["bash", "-c", "apt-get update -qq && apt-get install -y -qq libgomp1 && pip install --quiet psycopg2-binary boto3 lightgbm scikit-learn pandas numpy && mlflow server --host 0.0.0.0 --port 5001 --backend-store-uri postgresql://${POSTGRES_USER:-supplychain}:${POSTGRES_PASSWORD:-supplychain_secret}@postgresql:5432/${POSTGRES_DB:-supplychain} --default-artifact-root s3://ml-artifacts/"]
    depends_on:
      postgresql:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 10s
      timeout: 20s
      retries: 15
      start_period: 420s

  mlflow-init:
    image: ghcr.io/mlflow/mlflow:v2.18.0
    container_name: mlflow-init
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5001
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-minioadmin_secret}
    command: ["bash", "-c", "apt-get update -qq && apt-get install -y -qq libgomp1 && pip install --quiet lightgbm boto3 && python /tmp/init-mlflow-model.py"]
    volumes:
      - ./scripts/init-mlflow-model.py:/tmp/init-mlflow-model.py
      - ./infra/mlflow/default-model:/tmp/default-model
    depends_on:
      mlflow:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Observability
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: otel-collector
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./infra/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml
    depends_on:
      - tempo
      - loki

  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    depends_on:
      - otel-collector

  loki:
    image: grafana/loki:3.3.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki/config.yaml:/etc/loki/config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yaml

  tempo:
    image: grafana/tempo:2.6.0
    container_name: tempo
    ports:
      - "3200:3200"   # Tempo API
    volumes:
      - ./infra/tempo/config.yaml:/etc/tempo/config.yaml
      - tempo-data:/var/tempo
    command: -config.file=/etc/tempo/config.yaml

  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo

  # ---------------------------------------------------------------------------
  # Application
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      OTEL_SERVICE_NAME: api
    depends_on:
      kafka:
        condition: service_healthy
      postgresql:
        condition: service_healthy
      otel-collector:
        condition: service_started

  stream-processor:
    build:
      context: .
      dockerfile: services/stream_processor/Dockerfile
    container_name: stream-processor
    env_file: .env
    environment:
      OTEL_SERVICE_NAME: stream-processor
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgresql:
        condition: service_healthy
      otel-collector:
        condition: service_started
      mlflow-init:
        condition: service_completed_successfully

  test-ui:
    build: services/test-ui
    container_name: test-ui
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://api:8000
      DATABASE_URL: "postgresql://${POSTGRES_USER:-supplychain}:${POSTGRES_PASSWORD:-supplychain_secret}@postgresql:5432/${POSTGRES_DB:-supplychain}"
    depends_on:
      - api
      - postgresql

volumes:
  kafka-data:
  postgres-data:
  minio-data:
  mlflow-data:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:
