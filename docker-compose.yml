services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.7.1
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,HOST://0.0.0.0:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "q1Sh-9_ISia_zwGINzRvyQ"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.7.1
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/tmp/create-topics.sh"]
    volumes:
      - ./scripts/create-topics.sh:/tmp/create-topics.sh

  ksqldb-server:
    image: confluentinc/cp-ksqldb-server:7.7.1
    hostname: ksqldb-server
    container_name: ksqldb-server
    ports:
      - "8088:8088"
    environment:
      KSQL_BOOTSTRAP_SERVERS: kafka:29092
      KSQL_LISTENERS: http://0.0.0.0:8088
      KSQL_KSQL_SERVICE_ID: supplychain-ksqldb
      KSQL_KSQL_LOGGING_PROCESSING_STREAM_AUTO_CREATE: "true"
      KSQL_KSQL_LOGGING_PROCESSING_TOPIC_AUTO_CREATE: "true"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: curl -sf http://localhost:8088/info || exit 1
      interval: 10s
      timeout: 5s
      retries: 10

  ksqldb-cli:
    image: confluentinc/cp-ksqldb-cli:7.7.1
    container_name: ksqldb-cli
    entrypoint: /bin/sh
    tty: true
    depends_on:
      ksqldb-server:
        condition: service_healthy

  ksqldb-init:
    image: confluentinc/cp-ksqldb-cli:7.7.1
    container_name: ksqldb-init
    depends_on:
      ksqldb-server:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    entrypoint: ["/bin/bash", "/tmp/init-ksqldb.sh"]
    volumes:
      - ./infra/ksqldb/init.sql:/tmp/init.sql
      - ./scripts/init-ksqldb.sh:/tmp/init-ksqldb.sh

  postgresql:
    image: postgres:16
    container_name: postgresql
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-supplychain}
      POSTGRES_USER: ${POSTGRES_USER:-supplychain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supplychain_secret}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER:-supplychain}
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin_secret}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: mc ready local
      interval: 10s
      timeout: 5s
      retries: 3

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/tmp/init-buckets.sh"]
    volumes:
      - ./scripts/init-buckets.sh:/tmp/init-buckets.sh

  # ---------------------------------------------------------------------------
  # Observability
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: otel-collector
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./infra/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml
    depends_on:
      - tempo
      - loki

  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    depends_on:
      - otel-collector

  loki:
    image: grafana/loki:3.3.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki/config.yaml:/etc/loki/config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yaml

  tempo:
    image: grafana/tempo:2.6.0
    container_name: tempo
    ports:
      - "3200:3200"   # Tempo API
    volumes:
      - ./infra/tempo/config.yaml:/etc/tempo/config.yaml
      - tempo-data:/var/tempo
    command: -config.file=/etc/tempo/config.yaml

  grafana:
    image: grafana/grafana:11.3.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo

  # ---------------------------------------------------------------------------
  # Application
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      OTEL_SERVICE_NAME: api
    depends_on:
      kafka:
        condition: service_healthy
      postgresql:
        condition: service_healthy
      otel-collector:
        condition: service_started

  stream-processor:
    build:
      context: .
      dockerfile: services/stream_processor/Dockerfile
    container_name: stream-processor
    env_file: .env
    environment:
      OTEL_SERVICE_NAME: stream-processor
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgresql:
        condition: service_healthy
      otel-collector:
        condition: service_started

volumes:
  kafka-data:
  postgres-data:
  minio-data:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:
